services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ./.env

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./database_setup.sql:/docker-entrypoint-initdb.d/database_setup.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
